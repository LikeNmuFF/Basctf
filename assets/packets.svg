    </path>
  </g>
  <circle r="5" fill="#00ffc6">
    <animateMotion dur="3s" repeatCount="indefinite" path="M20 30 Q180 80 340 30 T700 30"/>
  </circle>
  <circle r="5" fill="#9b5cff" opacity="0.7">
