<svg width="720" height="120" viewBox="0 0 720 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="packet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9b5cff"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffc6"/>
    </linearGradient>
  </defs>
  <rect width="720" height="120" fill="#06090f" rx="12"/>
  <g stroke="url(#packet)" stroke-width="3" stroke-linecap="round">
    <path d="M20 30 Q180 80 340 30 T700 30" fill="none">
      <animate attributeName="stroke-dasharray" values="0,800;800,0" dur="3s" repeatCount="indefinite"/>
